<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Static Centered 600x900 Box</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
}

.bryaindex-box{
  position:fixed;
  left:50vw;
  top:50vh;
  transform:translate(-50%,-50%);
  width:600px;
  height:900px;
  border:1px solid #fff;
  background:#070707;
}
</style>
</head>

<body>
<div class="bryaindex-box"></div>
</body>
</html>
