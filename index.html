<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bryaindex</title>
<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.bryaindex-box{
  position:fixed;
  left:50vw;
  top:50vh;
  transform:translate(-50%,-50%);
  width:600px;
  height:900px;
  border:1px solid #fff;
  background:#070707;
}

.status-sticker{
  position:absolute;
  left:0;
  top:0;
  width:360px;
  height:122px;
  border:0;
  background:transparent;
  display:block;
  overflow:visible;
}
</style>
</head>

<body>
<div class="bryaindex-box">
  <iframe class="status-sticker cache-frame" data-src="buttons/status.html" title="Status Buttons"></iframe>
</div>

<script>
const cacheVersion=Date.now()+'-'+Math.random().toString(36).slice(2);

document.querySelectorAll('iframe.cache-frame').forEach(frame=>{
  const base=frame.dataset.src || frame.getAttribute('src');
  if(!base){
    return;
  }

  const joiner=base.includes('?') ? '&' : '?';
  frame.src=base+joiner+'v='+cacheVersion;
});
</script>
</body>
</html>
