<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Static 350x600 Box</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
}

.bryaindex-box{
  position:absolute;
  left:50%;
  top:0;
  margin-left:-175px;
  width:350px;
  height:600px;
  border:1px solid #fff;
  background:#070707;
}
</style>
</head>

<body>
<div class="bryaindex-box"></div>
</body>
</html>
