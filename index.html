<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Static 350x750 Box</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
}

.bryaindex-box{
  position:absolute;
  left:0;
  top:0;
  width:350px;
  height:750px;
  border:1px solid #fff;
  background:#070707;
}

.label{
  position:absolute;
  color:#fff;
  font-size:10px;
  font-weight:bold;
  letter-spacing:.08em;
  white-space:nowrap;
  pointer-events:none;
}

.label-top{
  left:155px;
  top:4px;
}

.label-bottom{
  left:155px;
  bottom:4px;
}

.label-left{
  left:4px;
  top:370px;
  transform:rotate(-90deg);
}

.label-right{
  right:4px;
  top:370px;
  transform:rotate(90deg);
}
</style>
</head>

<body>

<div class="bryaindex-box">
  <div class="label label-top">350px</div>
  <div class="label label-bottom">350px</div>
  <div class="label label-left">750px</div>
  <div class="label label-right">750px</div>
</div>

</body>
</html>
