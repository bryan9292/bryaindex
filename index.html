<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bryaindex</title>
<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.bryaindex-box{
  position:fixed;
  left:50vw;
  top:50vh;
  transform:translate(-50%,-50%);
  width:600px;
  height:900px;
  border:1px solid #fff;
  background:#070707;
}

.status-sticker{
  position:absolute;
  left:0;
  top:0;
  width:384px;
  height:146px;
  border:0;
  background:transparent;
  display:block;
  overflow:visible;
}

.utility-button{
  position:fixed;
  left:18px;
  width:78px;
  height:36px;
  border:1px solid rgba(255,255,255,.55);
  border-radius:999px;
  background:#090909;
  color:#fff;
  font-size:11px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  z-index:90;
}

.iframe-toggle{
  top:calc(50vh - 22px);
}

.grid-toggle{
  top:calc(50vh + 22px);
}

body.show-iframes .iframe-toggle,
body.show-grid .grid-toggle{
  background:#fff;
  color:#000;
}

body.show-iframes iframe.cache-frame{
  outline:2px solid #fff;
  outline-offset:0;
  box-shadow:
    0 0 0 1px rgba(0,0,0,.75),
    0 0 18px rgba(255,255,255,.55);
}

.iframe-debug-label{
  position:absolute;
  display:none;
  z-index:80;
  padding:3px 6px;
  border:1px solid rgba(255,255,255,.8);
  border-radius:6px;
  background:rgba(0,0,0,.82);
  color:#fff;
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  line-height:1;
  pointer-events:none;
  white-space:nowrap;
  text-shadow:0 0 6px rgba(255,255,255,.35);
}

body.show-iframes .iframe-debug-label{
  display:block;
}

.board-size-label{
  position:absolute;
  z-index:75;
  padding:4px 7px;
  border:1px solid rgba(255,255,255,.72);
  border-radius:8px;
  background:rgba(0,0,0,.82);
  color:#fff;
  font-size:11px;
  font-weight:900;
  letter-spacing:.09em;
  line-height:1;
  pointer-events:none;
  white-space:nowrap;
  text-shadow:0 0 7px rgba(255,255,255,.35);
}

.board-width-label{
  left:50%;
  top:-24px;
  transform:translateX(-50%);
}

.board-height-label{
  right:-58px;
  top:50%;
  transform:translateY(-50%) rotate(90deg);
  transform-origin:center;
}

.grid-overlay{
  position:absolute;
  inset:0;
  display:none;
  z-index:70;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.18) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
  background-size:
    100px 100px,
    100px 100px,
    20px 20px,
    20px 20px;
}

body.show-grid .grid-overlay{
  display:block;
}

.grid-number{
  position:absolute;
  color:rgba(255,255,255,.88);
  font-size:10px;
  font-weight:900;
  letter-spacing:.06em;
  text-shadow:
    0 0 5px #000,
    0 0 8px #000;
}

.grid-x{
  top:3px;
  transform:translateX(3px);
}

.grid-y{
  left:3px;
  transform:translateY(3px);
}
</style>
</head>

<body>
<button class="utility-button iframe-toggle" type="button" onclick="toggleIframes()">iframe</button>
<button class="utility-button grid-toggle" type="button" onclick="toggleGrid()">grid</button>

<div class="bryaindex-box">
  <div class="board-size-label board-width-label">600 W</div>
  <div class="board-size-label board-height-label">900 H</div>
  <div class="grid-overlay" id="gridOverlay"></div>

  <iframe class="status-sticker cache-frame" data-src="buttons/status.html" title="Status Buttons"></iframe>
</div>

<script>
const cacheVersion=Date.now()+'-'+Math.random().toString(36).slice(2);

document.querySelectorAll('iframe.cache-frame').forEach(frame=>{
  const base=frame.dataset.src || frame.getAttribute('src');
  if(!base){
    return;
  }

  const joiner=base.includes('?') ? '&' : '?';
  frame.src=base+joiner+'v='+cacheVersion;
});

function clearIframeLabels(){
  document.querySelectorAll('.iframe-debug-label').forEach(label=>label.remove());
}

function makeIframeLabels(){
  clearIframeLabels();

  document.querySelectorAll('iframe.cache-frame').forEach(frame=>{
    const label=document.createElement('div');
    const w=Math.round(frame.offsetWidth);
    const h=Math.round(frame.offsetHeight);

    label.className='iframe-debug-label';
    label.textContent=`${w} × ${h}`;

    const left=frame.offsetLeft;
    const top=frame.offsetTop;

    label.style.left=left+'px';
    label.style.top=(top-18)+'px';

    if(top<20){
      label.style.top=(top+h+4)+'px';
    }

    frame.parentElement.appendChild(label);
  });
}

function buildGrid(){
  const grid=document.getElementById('gridOverlay');
  grid.innerHTML='';

  for(let x=0;x<=600;x+=100){
    const label=document.createElement('div');
    label.className='grid-number grid-x';
    label.textContent=x;
    label.style.left=x+'px';
    grid.appendChild(label);
  }

  for(let y=0;y<=900;y+=100){
    const label=document.createElement('div');
    label.className='grid-number grid-y';
    label.textContent=y;
    label.style.top=y+'px';
    grid.appendChild(label);
  }
}

function toggleIframes(){
  document.body.classList.toggle('show-iframes');

  if(document.body.classList.contains('show-iframes')){
    makeIframeLabels();
  }else{
    clearIframeLabels();
  }
}

function toggleGrid(){
  document.body.classList.toggle('show-grid');
  buildGrid();
}

window.addEventListener('resize',()=>{
  if(document.body.classList.contains('show-iframes')){
    makeIframeLabels();
  }
});

buildGrid();
</script>
</body>
</html>
