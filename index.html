<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>Bryaindex</title>
<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.bryaindex-box{
  position:fixed;
  left:50vw;
  top:50vh;
  transform:translate(-50%,-50%);
  width:600px;
  height:900px;
  border:1px solid #fff;
  background:#070707;
}

.status-sticker{
  position:absolute;
  left:0;
  top:0;
  width:600px;
  height:128px;
  border:0;
  background:transparent;
  display:block;
  overflow:visible;
}
</style>
</head>

<body>
<div class="bryaindex-box">
  <iframe class="status-sticker" src="buttons/status.html" title="Status Buttons"></iframe>
</div>
</body>
</html>
