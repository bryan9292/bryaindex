<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>Nail Frame</title>
<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:210px;
  height:255px;
  background:transparent;
  overflow:visible;
}

body{
  position:relative;
}

.wall-frame{
  position:absolute;
  left:10px;
  top:10px;
  width:190px;
  height:235px;
}

.nail{
  position:absolute;
  top:0;
  left:50%;
  width:12px;
  height:12px;
  background:linear-gradient(145deg,#aaa,#555);
  border-radius:50%;
  transform:translateX(-50%);
  box-shadow:
    0 0 8px rgba(255,255,255,.25),
    inset 0 1px 2px rgba(255,255,255,.5);
  z-index:5;
}

.hanger{
  position:absolute;
  top:8px;
  left:50%;
  width:145px;
  height:78px;
  transform:translateX(-50%);
  z-index:2;
  pointer-events:none;
}

.hanger span{
  position:absolute;
  top:0;
  width:3px;
  height:98px;
  background:#8b6a3e;
  border-radius:999px;
  transform-origin:top center;
  box-shadow:0 0 3px rgba(0,0,0,.65);
}

.hanger span:first-child{
  left:50%;
  transform:translateX(-50%) rotate(34deg);
}

.hanger span:last-child{
  left:50%;
  transform:translateX(-50%) rotate(-34deg);
}

.photo-frame{
  position:absolute;
  top:82px;
  left:50%;
  width:145px;
  height:110px;
  padding:9px;
  background:linear-gradient(145deg,#4a2a19,#b57a3c,#321c12);
  border-radius:10px;
  transform:translateX(-50%);
  box-shadow:
    0 18px 35px rgba(0,0,0,.48),
    inset 0 0 0 2px rgba(255,255,255,.12),
    inset 0 0 18px rgba(0,0,0,.35);
  z-index:3;
}

.photo{
  width:100%;
  height:100%;
  border-radius:5px;
  background:linear-gradient(145deg,#151515,#252525);
  box-shadow:
    inset 0 0 18px rgba(0,0,0,.55),
    inset 0 0 0 1px rgba(255,255,255,.04);
}
</style>
</head>

<body>
<div class="wall-frame">
  <div class="nail"></div>

  <div class="hanger">
    <span></span>
    <span></span>
  </div>

  <div class="photo-frame">
    <div class="photo"></div>
  </div>
</div>
</body>
</html>
