<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bill of Sale Assets</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:#111;
  display:grid;
  place-items:center;
  font-family:system-ui,sans-serif;
}

.asset-page{
  position:relative;
  width:320px;
  height:520px;
  border:3px solid rgba(255,255,255,.75);
  border-radius:24px;
  background:
    radial-gradient(circle at 50% 20%,rgba(255,210,120,.12),transparent 38%),
    #070707;
  overflow:hidden;
  box-shadow:0 24px 55px rgba(0,0,0,.75);
}

.title{
  position:absolute;
  top:28px;
  left:0;
  right:0;
  text-align:center;
  color:#f5d27a;
  font-size:17px;
  font-weight:950;
  letter-spacing:.14em;
  text-transform:uppercase;
}

.asset-row{
  position:absolute;
  left:0;
  right:0;
  bottom:22px;
  height:125px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:18px;
}

.asset{
  display:block;
  object-fit:contain;
  filter:
    drop-shadow(0 10px 14px rgba(0,0,0,.65))
    drop-shadow(0 0 10px rgba(255,190,70,.18));
}

.nest{
  width:120px;
  height:70px;
}

.feather{
  width:120px;
  height:120px;
  transform:rotate(-18deg);
  transform-origin:center;
}
</style>
</head>

<body>

<div class="asset-page">
  <div class="title">Bill of Sale</div>

  <div class="asset-row">
    <img class="asset nest" src="9893E20F-645D-49FD-B20F-B43E24873525.png" alt="Nest Holder">
    <img class="asset feather" src="gold_feather_pen_transparent.svg" alt="Gold Feather Pen">
  </div>
</div>

</body>
</html>
