<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>Fridge Opening Logic</title>
<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:360px;
  height:450px;
  background:transparent;
  overflow:visible;
}

body{
  position:relative;
  font-family:system-ui,sans-serif;
  perspective:900px;
}

.fridge-wrap{
  position:absolute;
  left:118px;
  top:10px;
  width:210px;
  height:430px;
}

.fridge{
  position:absolute;
  inset:0;
  border:5px solid #b9c0c5;
  border-radius:18px 18px 10px 10px;
  background:#d7dde1;
  box-shadow:
    inset -14px 0 24px rgba(0,0,0,.12),
    0 28px 55px rgba(0,0,0,.6);
  overflow:visible;
}

.inside{
  position:absolute;
  left:0;
  width:100%;
  background:
    linear-gradient(90deg,rgba(255,255,255,.12),transparent 35%),
    #22282c;
  border:2px solid rgba(255,255,255,.16);
  box-shadow:inset 0 0 30px rgba(0,0,0,.65);
}

.freezer-inside{
  top:0;
  height:96px;
  border-radius:12px 12px 0 0;
}

.fridge-inside{
  top:101px;
  bottom:0;
  border-radius:0 0 7px 7px;
}

.fridge-inside.ready{
  box-shadow:
    inset 0 0 30px rgba(0,0,0,.65),
    inset 0 0 22px rgba(145,230,255,.65);
}

.fridge-inside.accept{
  animation:acceptPulse .38s ease;
}

@keyframes acceptPulse{
  0%{filter:brightness(1)}
  45%{filter:brightness(1.55)}
  100%{filter:brightness(1)}
}

.shelf{
  position:absolute;
  left:18px;
  right:18px;
  height:3px;
  background:rgba(255,255,255,.35);
  box-shadow:0 0 10px rgba(255,255,255,.16);
}

.freezer-inside .shelf{top:48px}
.fridge-inside .shelf.one{top:86px}
.fridge-inside .shelf.two{top:178px}

.stored-cubes{
  position:absolute;
  left:18px;
  right:18px;
  bottom:18px;
  min-height:48px;
  display:flex;
  align-items:flex-end;
  gap:8px;
  z-index:2;
}

.door{
  position:absolute;
  left:0;
  width:100%;
  transform-origin:right center;
  transform-style:preserve-3d;
  transition:box-shadow .18s ease;
  background:
    linear-gradient(90deg,rgba(255,255,255,.35),transparent 28%,rgba(0,0,0,.08)),
    #e9edf0;
  border-left:0;
  border-right:0;
  z-index:3;
  pointer-events:none;
}

.freezer-door{
  top:0;
  height:96px;
  border-radius:13px 13px 0 0;
  border-bottom:5px solid #b9c0c5;
}

.fridge-door{
  top:101px;
  bottom:0;
  border-radius:0 0 5px 5px;
}

.freezer-door,
.fridge-door{
  transform:rotateY(var(--open-angle,0deg));
}

.drag-zone{
  position:absolute;
  left:0;
  width:100%;
  z-index:30;
  background:transparent;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  cursor:grab;
}

.drag-zone:active{
  cursor:grabbing;
}

.freezer-drag{
  top:0;
  height:96px;
}

.fridge-drag{
  top:101px;
  bottom:0;
}

.handle{
  position:absolute;
  left:18px;
  width:16px;
  border-radius:999px;
  background:linear-gradient(90deg,#d7dde1,#f9fbfc,#aeb6bd);
  box-shadow:
    inset 3px 0 5px rgba(255,255,255,.7),
    4px 4px 10px rgba(0,0,0,.18);
  z-index:7;
  pointer-events:none;
}

.handle.freezer{
  top:28px;
  height:46px;
}

.handle.fridge{
  top:31px;
  height:145px;
}

.paper{
  position:absolute;
  background:#fffdf4;
  border:2px solid #eee1bf;
  box-shadow:0 6px 12px rgba(0,0,0,.18);
  z-index:6;
  pointer-events:none;
}

.paper.one{
  width:82px;
  height:72px;
  right:22px;
  top:31px;
  transform:rotate(4deg);
}

.paper.two{
  width:92px;
  height:82px;
  left:56px;
  bottom:58px;
  transform:rotate(-5deg);
}

.magnet{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  box-shadow:
    inset 2px 2px 4px rgba(255,255,255,.55),
    0 3px 5px rgba(0,0,0,.25);
  z-index:8;
  pointer-events:none;
}

.red{background:#e84848}
.green{background:#3fc46b}
.m1{right:52px;top:22px}
.m3{left:82px;bottom:132px}

.sun{
  position:absolute;
  right:9px;
  top:8px;
  width:20px;
  height:20px;
  background:#ffd84a;
  border-radius:50%;
}

.hill{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:26px;
  background:#76c46f;
  border-radius:50% 50% 0 0;
}

.house{
  position:absolute;
  left:20px;
  bottom:22px;
  width:32px;
  height:25px;
  background:#f05b5b;
}

.house:before{
  content:"";
  position:absolute;
  left:-5px;
  top:-18px;
  border-left:21px solid transparent;
  border-right:21px solid transparent;
  border-bottom:20px solid #7a4a2a;
}

.stick{
  position:absolute;
  left:28px;
  bottom:18px;
  width:4px;
  height:30px;
  background:#6b3b1d;
}

.face{
  position:absolute;
  left:20px;
  bottom:47px;
  width:20px;
  height:20px;
  background:#ffc08a;
  border-radius:50%;
}

.line{position:absolute;background:#6b3b1d}
.arm{width:28px;height:4px;top:27px}
.arm.left{right:2px;transform:rotate(-28deg)}
.arm.right{left:2px;transform:rotate(28deg)}
.foot{width:4px;height:24px;bottom:-18px;background:#3355aa}
.foot.left{left:4px;transform:rotate(20deg)}
.foot.right{right:4px;transform:rotate(-20deg)}

.rainbow{
  position:absolute;
  left:12px;
  bottom:16px;
  width:58px;
  height:34px;
  border-radius:60px 60px 0 0;
  border-top:6px solid #e84848;
  border-left:6px solid #e84848;
  border-right:6px solid #e84848;
}

.rainbow:before{
  content:"";
  position:absolute;
  left:5px;
  top:5px;
  width:36px;
  height:21px;
  border-radius:40px 40px 0 0;
  border-top:6px solid #ffd84a;
  border-left:6px solid #ffd84a;
  border-right:6px solid #ffd84a;
}

.rainbow:after{
  content:"";
  position:absolute;
  left:15px;
  top:14px;
  width:17px;
  height:10px;
  border-radius:30px 30px 0 0;
  border-top:6px solid #3c7cff;
  border-left:6px solid #3c7cff;
  border-right:6px solid #3c7cff;
}

.note{
  position:absolute;
  right:18px;
  bottom:155px;
  width:48px;
  height:32px;
  background:#fff7b8;
  transform:rotate(7deg);
  border:2px solid #ebd86b;
  box-shadow:0 4px 8px rgba(0,0,0,.15);
  z-index:7;
  pointer-events:none;
}

.note:after{
  content:"A+";
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  color:#e84848;
  font-weight:900;
  font-size:17px;
}

.cube-rack{
  position:absolute;
  left:12px;
  top:142px;
  width:72px;
  display:grid;
  gap:14px;
  z-index:80;
}

.cube{
  width:42px;
  height:42px;
  border:3px solid #111;
  border-radius:9px;
  cursor:grab;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  box-shadow:
    inset 6px 6px 0 rgba(255,255,255,.32),
    inset -7px -7px 0 rgba(0,0,0,.16),
    0 8px 10px rgba(0,0,0,.28);
  transition:
    left .42s cubic-bezier(.2,.9,.2,1),
    top .42s cubic-bezier(.2,.9,.2,1),
    transform .42s cubic-bezier(.2,.9,.2,1),
    opacity .28s ease,
    filter .28s ease;
}

.cube:active{
  cursor:grabbing;
}

.cube.blue{background:#69cfff}
.cube.yellow{background:#ffe16a}
.cube.redcube{background:#ff7b65}

.cube.dragging{
  position:fixed;
  z-index:999;
  pointer-events:none;
  transform:scale(1.08) rotate(4deg);
  transition:none;
}

.cube.accepting{
  position:fixed;
  z-index:999;
  pointer-events:none;
  transform:scale(.58) rotate(-13deg);
  opacity:.55;
  filter:saturate(.75) brightness(1.25);
}

.cube.stored{
  position:relative;
  left:auto!important;
  top:auto!important;
  width:34px;
  height:34px;
  border-width:2px;
  border-radius:8px;
  cursor:default;
  transform:none;
  opacity:1;
  filter:none;
  box-shadow:
    inset 5px 5px 0 rgba(255,255,255,.25),
    inset -5px -5px 0 rgba(0,0,0,.2),
    0 4px 8px rgba(0,0,0,.35);
}

.shadow{
  position:absolute;
  bottom:-35px;
  left:50%;
  width:190px;
  height:28px;
  transform:translateX(-50%);
  background:rgba(0,0,0,.5);
  filter:blur(9px);
  border-radius:50%;
  z-index:-1;
}
</style>
</head>

<body>

<div class="cube-rack" id="cubeRack">
  <div class="cube blue" data-cube="blue"></div>
  <div class="cube yellow" data-cube="yellow"></div>
  <div class="cube redcube" data-cube="red"></div>
</div>

<div class="fridge-wrap" id="fridgeWrap">
  <div class="fridge">

    <div class="inside freezer-inside">
      <div class="shelf"></div>
    </div>

    <div class="inside fridge-inside" id="fridgeInside">
      <div class="shelf one"></div>
      <div class="shelf two"></div>
      <div class="stored-cubes" id="storedCubes"></div>
    </div>

    <div class="door freezer-door" id="freezerDoor">
      <div class="handle freezer"></div>
      <div class="paper one">
        <div class="sun"></div>
        <div class="house"></div>
        <div class="hill"></div>
      </div>
      <div class="magnet red m1"></div>
    </div>

    <div class="door fridge-door" id="fridgeDoor">
      <div class="handle fridge"></div>

      <div class="paper two">
        <div class="rainbow"></div>
        <div class="stick">
          <div class="face"></div>
          <div class="line arm left"></div>
          <div class="line arm right"></div>
          <div class="line foot left"></div>
          <div class="line foot right"></div>
        </div>
      </div>

      <div class="note"></div>
      <div class="magnet green m3"></div>
    </div>

    <div class="drag-zone freezer-drag" id="freezerDrag"></div>
    <div class="drag-zone fridge-drag" id="fridgeDrag"></div>

    <div class="shadow"></div>
  </div>
</div>

<script>
function clamp(value,min,max){
  return Math.max(min,Math.min(max,value));
}

function makeDraggableFridgeDoor(dragId,doorId,maxAngle){
  const dragger=document.getElementById(dragId);
  const door=document.getElementById(doorId);

  let amount=0;
  let startX=0;
  let startAmount=0;
  let dragging=false;

  function render(){
    const angle=amount*maxAngle;
    const shadowPull=amount*18;

    door.dataset.openAmount=amount;
    door.style.setProperty("--open-angle",angle+"deg");
    door.style.boxShadow=
      `inset -14px 0 24px rgba(0,0,0,.12),
       ${-6-shadowPull}px 12px 22px rgba(0,0,0,.45)`;
  }

  function begin(clientX){
    dragging=true;
    startX=clientX;
    startAmount=amount;
  }

  function move(clientX){
    if(!dragging){
      return;
    }

    const dx=clientX-startX;
    amount=clamp(startAmount + dx/90,0,1);
    render();
  }

  function end(){
    dragging=false;
  }

  dragger.addEventListener("touchstart",event=>{
    if(event.touches.length!==1){
      return;
    }

    event.preventDefault();
    begin(event.touches[0].clientX);
  },{passive:false});

  dragger.addEventListener("touchmove",event=>{
    if(event.touches.length!==1){
      return;
    }

    event.preventDefault();
    move(event.touches[0].clientX);
  },{passive:false});

  dragger.addEventListener("touchend",end);
  dragger.addEventListener("touchcancel",end);

  dragger.addEventListener("mousedown",event=>{
    event.preventDefault();
    begin(event.clientX);
  });

  window.addEventListener("mousemove",event=>{
    move(event.clientX);
  });

  window.addEventListener("mouseup",end);

  render();
}

function makeCubeStorage(){
  const fridgeDoor=document.getElementById("fridgeDoor");
  const fridgeInside=document.getElementById("fridgeInside");
  const storedCubes=document.getElementById("storedCubes");

  document.querySelectorAll(".cube").forEach(cube=>{
    const home={left:0,top:0};
    let dragging=false;
    let shiftX=0;
    let shiftY=0;

    function rememberHome(){
      const rect=cube.getBoundingClientRect();
      home.left=rect.left;
      home.top=rect.top;
    }

    function begin(clientX,clientY){
      if(cube.classList.contains("stored")){
        return;
      }

      rememberHome();
      const rect=cube.getBoundingClientRect();
      shiftX=clientX-rect.left;
      shiftY=clientY-rect.top;
      dragging=true;

      cube.classList.add("dragging");
      cube.style.left=rect.left+"px";
      cube.style.top=rect.top+"px";
    }

    function move(clientX,clientY){
      if(!dragging){
        return;
      }

      cube.style.left=(clientX-shiftX)+"px";
      cube.style.top=(clientY-shiftY)+"px";

      if(canAccept(clientX,clientY)){
        fridgeInside.classList.add("ready");
      }else{
        fridgeInside.classList.remove("ready");
      }
    }

    function canAccept(clientX,clientY){
      const openAmount=parseFloat(fridgeDoor.dataset.openAmount || "0");
      const rect=fridgeInside.getBoundingClientRect();

      return openAmount>.42 &&
        clientX>rect.left+8 &&
        clientX<rect.right-8 &&
        clientY>rect.top+8 &&
        clientY<rect.bottom-8;
    }

    function accept(clientX,clientY){
      const insideRect=fridgeInside.getBoundingClientRect();
      const targetLeft=insideRect.left+insideRect.width*.5-17;
      const targetTop=insideRect.bottom-62;

      fridgeInside.classList.remove("ready");
      fridgeInside.classList.add("accept");
      cube.classList.remove("dragging");
      cube.classList.add("accepting");
      cube.style.left=targetLeft+"px";
      cube.style.top=targetTop+"px";

      setTimeout(()=>{
        fridgeInside.classList.remove("accept");
        cube.classList.remove("accepting");
        cube.classList.add("stored");
        cube.style.left="";
        cube.style.top="";
        storedCubes.appendChild(cube);
      },430);
    }

    function snapBack(){
      fridgeInside.classList.remove("ready");
      cube.classList.remove("dragging");
      cube.style.left=home.left+"px";
      cube.style.top=home.top+"px";

      setTimeout(()=>{
        cube.style.left="";
        cube.style.top="";
      },430);
    }

    function end(clientX,clientY){
      if(!dragging){
        return;
      }

      dragging=false;

      if(canAccept(clientX,clientY)){
        accept(clientX,clientY);
      }else{
        snapBack();
      }
    }

    cube.addEventListener("touchstart",event=>{
      if(event.touches.length!==1){
        return;
      }

      event.preventDefault();
      begin(event.touches[0].clientX,event.touches[0].clientY);
    },{passive:false});

    window.addEventListener("touchmove",event=>{
      if(!dragging || event.touches.length!==1){
        return;
      }

      event.preventDefault();
      move(event.touches[0].clientX,event.touches[0].clientY);
    },{passive:false});

    window.addEventListener("touchend",event=>{
      const touch=event.changedTouches[0];
      if(!touch){
        return;
      }

      end(touch.clientX,touch.clientY);
    });

    cube.addEventListener("mousedown",event=>{
      event.preventDefault();
      begin(event.clientX,event.clientY);
    });

    window.addEventListener("mousemove",event=>{
      move(event.clientX,event.clientY);
    });

    window.addEventListener("mouseup",event=>{
      end(event.clientX,event.clientY);
    });
  });
}

makeDraggableFridgeDoor("freezerDrag","freezerDoor",72);
makeDraggableFridgeDoor("fridgeDrag","fridgeDoor",78);
makeCubeStorage();
</script>

</body>
</html>
