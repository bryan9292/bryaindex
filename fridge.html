<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>Fridge Storage Test</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:390px;height:520px;background:white;overflow:hidden;font-family:system-ui,sans-serif}
body{position:relative;display:grid;place-items:center;perspective:900px}
.stage{position:relative;width:370px;height:500px}.test-buttons{position:absolute;left:0;top:30px;width:112px;display:grid;gap:10px;z-index:20}
.test-btn{height:38px;border:3px solid #111;border-radius:12px;font-weight:900;color:#111;cursor:grab;box-shadow:0 5px 0 #111;touch-action:none;user-select:none}.test-btn.selected{outline:4px solid #111;filter:brightness(1.08)}.test-btn.dragging{position:fixed;z-index:999;pointer-events:none;transform:scale(1.05) rotate(2deg);box-shadow:0 12px 18px rgba(0,0,0,.35)}.test-btn.stored{display:none}
.c1{background:#ff6b6b}.c2{background:#ffd166}.c3{background:#6bff95}.c4{background:#6bdcff}.c5{background:#9b8cff}.c6{background:#ff8ce3}
.fridge-wrap{position:absolute;right:10px;top:20px;width:210px;height:430px}.fridge{position:absolute;inset:0;border:5px solid #b9c0c5;border-radius:18px 18px 10px 10px;background:#d7dde1;box-shadow:inset -14px 0 24px rgba(0,0,0,.12),0 28px 55px rgba(0,0,0,.38);overflow:visible}
.inside{position:absolute;left:0;width:100%;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent 38%),#171b1f;border:2px solid rgba(255,255,255,.12);box-shadow:inset 0 0 36px rgba(0,0,0,.78);transition:background .12s ease,box-shadow .12s ease,filter .12s ease}.freezer-inside{top:0;height:96px;border-radius:12px 12px 0 0}.fridge-inside{top:101px;bottom:0;border-radius:0 0 7px 7px}.fridge-inside.light{background:linear-gradient(90deg,rgba(255,255,255,.42),rgba(245,252,255,.34) 48%,rgba(255,255,255,.26)),#cfd8dd;box-shadow:inset 0 0 28px rgba(255,255,255,.78),inset 0 0 52px rgba(232,246,255,.62)}.fridge-inside.ready{box-shadow:inset 0 0 28px rgba(255,255,255,.66),inset 0 0 24px rgba(145,230,255,.9),inset 0 0 52px rgba(232,246,255,.55)}.fridge-inside.flicker{background:linear-gradient(90deg,rgba(255,255,255,.12),transparent 38%),#252b30;box-shadow:inset 0 0 36px rgba(0,0,0,.55)}
.fridge-inside:before{content:"";position:absolute;right:22px;top:14px;width:26px;height:10px;border:2px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(255,255,255,.05);z-index:2}.fridge-inside.light:before{background:#fff;border-color:#f7fbff;box-shadow:0 0 14px #fff,0 0 28px rgba(240,248,255,.95)}.fridge-inside.flicker:before{background:#dfe8ee;box-shadow:0 0 5px rgba(255,255,255,.55)}
.shelf{position:absolute;left:18px;right:18px;height:3px;background:rgba(255,255,255,.38);box-shadow:0 0 10px rgba(255,255,255,.18);z-index:1}.freezer-inside .shelf{top:48px}.fridge-inside .shelf.one{top:86px}.fridge-inside .shelf.two{top:178px}
.cube-bin{position:absolute;inset:0;z-index:40;pointer-events:none}.stored-cube{position:absolute;width:56px;height:56px;border:3px solid #111;border-radius:12px;box-shadow:inset 8px 8px 0 rgba(255,255,255,.28),inset -8px -8px 0 rgba(0,0,0,.18),0 6px 10px rgba(0,0,0,.4);animation:land .28s ease;cursor:grab;touch-action:none;pointer-events:auto;transition:filter .22s ease,opacity .22s ease}.stored-cube.sleeping{filter:grayscale(1) saturate(.08) brightness(.8);opacity:.58}.stored-cube.dragging{position:fixed;z-index:999;pointer-events:none;transform:scale(1.04) rotate(-3deg);animation:none;filter:none;opacity:1}.stored-cube:active{cursor:grabbing}@keyframes land{0%{transform:scale(.4) rotate(-12deg);opacity:.35}100%{transform:scale(1);opacity:1}}
.door{position:absolute;left:0;width:100%;transform-origin:right center;transform-style:preserve-3d;background:linear-gradient(90deg,rgba(255,255,255,.35),transparent 28%,rgba(0,0,0,.08)),#e9edf0;z-index:3;pointer-events:none}.freezer-door{top:0;height:96px;border-radius:13px 13px 0 0;border-bottom:5px solid #b9c0c5}.fridge-door{top:101px;bottom:0;border-radius:0 0 5px 5px}.freezer-door,.fridge-door{transform:rotateY(var(--open-angle,0deg))}
.handle{position:absolute;left:18px;width:16px;border-radius:999px;background:linear-gradient(90deg,#d7dde1,#f9fbfc,#aeb6bd);box-shadow:inset 3px 0 5px rgba(255,255,255,.7),4px 4px 10px rgba(0,0,0,.18);z-index:7}.handle.freezer{top:28px;height:46px}.handle.fridge{top:31px;height:145px}
.paper{position:absolute;background:#fffdf4;border:2px solid #eee1bf;box-shadow:0 6px 12px rgba(0,0,0,.18);z-index:6;overflow:hidden}.paper.one{width:82px;height:72px;right:22px;top:31px;transform:rotate(4deg);transition:background .35s ease}.paper.one .drawing,.paper.one .prompt,.paper.one .paper-text{position:absolute;inset:0;transition:opacity .35s ease}.paper.one .drawing{opacity:1}.paper.one .prompt{opacity:0;display:flex;align-items:center;justify-content:flex-start;text-align:left;padding-left:12px;font-weight:950;font-size:15px;line-height:.98;letter-spacing:.5px;color:#111;text-transform:uppercase}.paper.one .paper-text{opacity:0;border:0;background:transparent;resize:none;padding:8px 9px;font:900 12px/1.05 system-ui,sans-serif;color:#111;outline:none;text-align:left;text-transform:uppercase}.paper.one.blank .drawing{opacity:0}.paper.one.blank{background:#fffefa}.paper.one.prompting .prompt{opacity:1}.paper.one.prompting .drawing{opacity:0}.paper.one.editing .prompt,.paper.one.editing .drawing{opacity:0}.paper.one.editing .paper-text{opacity:1}.sun{position:absolute;right:9px;top:8px;width:18px;height:18px;background:#ffd84a;border:2px solid #111;border-radius:50%}.hill{position:absolute;left:-8px;right:-8px;bottom:-4px;height:30px;background:#70c36b;border-top:2px solid #111;border-radius:50% 50% 0 0}.house{position:absolute;left:18px;bottom:20px;width:30px;height:23px;background:#f05b5b;border:2px solid #111}.house:before{content:"";position:absolute;left:-6px;top:-17px;border-left:19px solid transparent;border-right:19px solid transparent;border-bottom:18px solid #7a4a2a}.paper.two{width:92px;height:82px;left:56px;bottom:58px;transform:rotate(-5deg)}.paper.two:after{content:"TEST";position:absolute;inset:0;display:grid;place-items:center;color:#222;font-weight:900;font-size:17px}
.magnet{position:absolute;width:18px;height:18px;border-radius:50%;box-shadow:inset 2px 2px 4px rgba(255,255,255,.55),0 3px 5px rgba(0,0,0,.25);z-index:8}.m1{background:#e84848;right:52px;top:22px}.m3{background:#3fc46b;left:82px;bottom:132px}.drag-zone{position:absolute;left:0;width:100%;z-index:30;background:transparent;touch-action:none;user-select:none;cursor:grab}.drag-zone:active{cursor:grabbing}.freezer-drag{top:0;height:96px}.fridge-drag{top:101px;bottom:0}.shadow{position:absolute;bottom:-35px;left:50%;width:190px;height:28px;transform:translateX(-50%);background:rgba(0,0,0,.35);filter:blur(9px);border-radius:50%;z-index:-1}
.label{position:absolute;left:0;bottom:22px;width:120px;font-size:12px;font-weight:900;line-height:1.15;color:#333}
</style>
</head>
<body>
<div class="stage"><div class="test-buttons" id="testButtons"><button class="test-btn c1">Test 1</button><button class="test-btn c2">Test 2</button><button class="test-btn c3">Test 3</button><button class="test-btn c4">Test 4</button><button class="test-btn c5">Test 5</button><button class="test-btn c6">Test 6</button></div><div class="label">New cube stays color. Older cubes grey. Close/open resets colors.</div><div class="fridge-wrap"><div class="fridge"><div class="inside freezer-inside"><div class="shelf"></div></div><div class="inside fridge-inside" id="fridgeInside"><div class="shelf one"></div><div class="shelf two"></div><div class="cube-bin" id="cubeBin"></div></div><div class="door freezer-door" id="freezerDoor"><div class="handle freezer"></div><div class="paper one" id="freezerPaper"><div class="drawing"><div class="sun"></div><div class="house"></div><div class="hill"></div></div><div class="prompt">TAP<br>TO<br>TYPE</div><textarea class="paper-text" id="paperText" maxlength="44" aria-label="fridge paper note"></textarea></div><div class="magnet m1"></div></div><div class="door fridge-door" id="fridgeDoor"><div class="handle fridge"></div><div class="paper two"></div><div class="magnet m3"></div></div><div class="drag-zone freezer-drag" id="freezerDrag"></div><div class="drag-zone fridge-drag" id="fridgeDrag"></div><div class="shadow"></div></div></div></div>
<script>
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function makeDoor(dragId,doorId,maxAngle){const dragger=document.getElementById(dragId),door=document.getElementById(doorId),inside=document.getElementById('fridgeInside'),paper=document.getElementById('freezerPaper');let amount=0,startX=0,startAmount=0,dragging=false,flickerBusy=false;function resetCubes(){document.querySelectorAll('.stored-cube').forEach(c=>c.classList.remove('sleeping'))}function maybeFlicker(){if(flickerBusy||!inside.classList.contains('light')||Math.random()>.035)return;flickerBusy=true;inside.classList.add('flicker');setTimeout(()=>{inside.classList.remove('flicker');flickerBusy=false},70+Math.random()*120)}function render(){const angle=amount*maxAngle,shadowPull=amount*18;door.dataset.openAmount=amount;door.style.setProperty('--open-angle',angle+'deg');door.style.boxShadow='inset -14px 0 24px rgba(0,0,0,.12),'+(-6-shadowPull)+'px 12px 22px rgba(0,0,0,.45)';if(doorId==='fridgeDoor'){inside.classList.toggle('light',amount>=.40);paper.classList.toggle('blank',amount>.18);if(amount<=.18){paper.classList.remove('prompting','editing');resetCubes()}maybeFlicker()}}function begin(x){dragging=true;startX=x;startAmount=amount}function move(x){if(!dragging)return;amount=clamp(startAmount+(x-startX)/90,0,1);render()}function end(){dragging=false}dragger.addEventListener('pointerdown',e=>{e.preventDefault();begin(e.clientX)});window.addEventListener('pointermove',e=>move(e.clientX));window.addEventListener('pointerup',end);render()}
function makeButtonStorage(){const fridgeDoor=document.getElementById('fridgeDoor'),inside=document.getElementById('fridgeInside'),bin=document.getElementById('cubeBin'),paper=document.getElementById('freezerPaper'),paperText=document.getElementById('paperText');let paperUsed=false;function doorOpen(){return parseFloat(fridgeDoor.dataset.openAmount||'0')>.42}function insidePoint(x,y){const r=inside.getBoundingClientRect();return x>r.left+8&&x<r.right-8&&y>r.top+8&&y<r.bottom-8}function canAccept(x,y){return doorOpen()&&insidePoint(x,y)}function spot(x,y){const r=inside.getBoundingClientRect(),s=56,localX=x-r.left-s/2,localY=y-r.top,shelves=[86,178,r.height-18],shelf=shelves.reduce((best,line)=>Math.abs(localY-line)<Math.abs(localY-best)?line:best,shelves[0]);return{left:clamp(localX,10,r.width-s-10),top:clamp(shelf-s,8,r.height-s-8)}}function makeLatest(cube){document.querySelectorAll('.stored-cube').forEach(c=>c.classList.add('sleeping'));cube.classList.remove('sleeping')}function markPaper(btn){document.querySelectorAll('.test-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');if(!paperUsed&&paper.classList.contains('blank')){paper.classList.add('prompting');paperUsed=true}}paper.addEventListener('pointerdown',e=>{if(!paper.classList.contains('prompting')&&!paper.classList.contains('editing'))return;e.stopPropagation();paper.classList.add('editing');paper.classList.remove('prompting');setTimeout(()=>paperText.focus(),0)});function wireCube(cube,btn){let dragging=false,shiftX=0,shiftY=0;function start(x,y){const r=cube.getBoundingClientRect();shiftX=x-r.left;shiftY=y-r.top;dragging=true;cube.classList.add('dragging');cube.style.left=r.left+'px';cube.style.top=r.top+'px'}function move(x,y){if(!dragging)return;cube.style.left=(x-shiftX)+'px';cube.style.top=(y-shiftY)+'px';inside.classList.toggle('ready',canAccept(x,y))}function restore(){cube.remove();btn.classList.remove('stored');btn.style.left='';btn.style.top='';btn.style.width='';inside.classList.remove('ready')}function end(x,y){if(!dragging)return;dragging=false;if(canAccept(x,y)){const p=spot(x,y);cube.classList.remove('dragging');bin.appendChild(cube);cube.style.left=p.left+'px';cube.style.top=p.top+'px';inside.classList.remove('ready');makeLatest(cube)}else restore()}cube.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();start(e.clientX,e.clientY)});window.addEventListener('pointermove',e=>move(e.clientX,e.clientY));window.addEventListener('pointerup',e=>end(e.clientX,e.clientY))}
document.querySelectorAll('.test-btn').forEach(btn=>{let dragging=false,shiftX=0,shiftY=0,home={left:0,top:0};function start(x,y){if(btn.classList.contains('stored'))return;markPaper(btn);const r=btn.getBoundingClientRect();home={left:r.left,top:r.top};shiftX=x-r.left;shiftY=y-r.top;dragging=true;btn.classList.add('dragging');btn.style.left=r.left+'px';btn.style.top=r.top+'px';btn.style.width=r.width+'px'}function move(x,y){if(!dragging)return;btn.style.left=(x-shiftX)+'px';btn.style.top=(y-shiftY)+'px';inside.classList.toggle('ready',canAccept(x,y))}function accept(x,y){const p=spot(x,y),cube=document.createElement('div');cube.className='stored-cube';cube.dataset.color=getComputedStyle(btn).backgroundColor;cube.style.background=cube.dataset.color;cube.style.left=p.left+'px';cube.style.top=p.top+'px';bin.appendChild(cube);wireCube(cube,btn);makeLatest(cube);btn.classList.remove('dragging');btn.classList.add('stored');inside.classList.remove('ready')}function snap(){inside.classList.remove('ready');btn.classList.remove('dragging');btn.style.left=home.left+'px';btn.style.top=home.top+'px';setTimeout(()=>{btn.style.left='';btn.style.top='';btn.style.width=''},430)}function end(x,y){if(!dragging)return;dragging=false;canAccept(x,y)?accept(x,y):snap()}btn.addEventListener('pointerdown',e=>{e.preventDefault();start(e.clientX,e.clientY)});window.addEventListener('pointermove',e=>move(e.clientX,e.clientY));window.addEventListener('pointerup',e=>end(e.clientX,e.clientY))})}
makeDoor('freezerDrag','freezerDoor',72);makeDoor('fridgeDrag','fridgeDoor',78);makeButtonStorage();
</script>
</body>
</html>
