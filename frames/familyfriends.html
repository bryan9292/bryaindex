<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>Family Friends Frames</title>
<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:190px;
  height:145px;
  overflow:visible;
  background:transparent;
}

body{
  position:relative;
}

.wall-piece{
  position:absolute;
  left:10px;
  top:10px;
  width:170px;
}

.main-title{
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-bottom:3px;
  font-family:Georgia,"Times New Roman",serif;
  font-size:12px;
  font-weight:900;
  line-height:1;
  letter-spacing:.025em;
  text-align:center;
  white-space:nowrap;
}

.main-title span{
  display:block;
  width:100%;
  text-align:center;
}

.main-title .left{
  color:#8f1515;
  text-shadow:
    0 1px 0 rgba(255,160,160,.35),
    0 4px 8px rgba(0,0,0,.75);
}

.main-title .right{
  color:#7a4a24;
  text-shadow:
    0 1px 0 rgba(255,210,160,.35),
    0 4px 8px rgba(0,0,0,.75);
}

.frame-row{
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  align-items:flex-start;
}

.triple-frame{
  width:100%;
  height:110px;
  min-width:0;
  display:grid;
  grid-template-columns:1fr;
  gap:5px;
  padding:7px;
  border-radius:10px;
  background:#8f1515;
  box-shadow:
    0 16px 34px rgba(0,0,0,.58),
    0 0 24px rgba(190,25,25,.25),
    inset 0 0 0 1px rgba(255,160,160,.18);
}

.triple-frame.brown{
  background:#7a4a24;
  box-shadow:
    0 16px 34px rgba(0,0,0,.58),
    0 0 24px rgba(140,85,40,.25),
    inset 0 0 0 1px rgba(255,205,155,.2);
}

.opening{
  min-height:0;
  border-radius:4px;
  background:#090606;
  box-shadow:
    inset 0 0 0 1px rgba(30,0,0,.85),
    inset 0 8px 18px rgba(0,0,0,.7);
}
</style>
</head>

<body>
<div class="wall-piece">
  <div class="main-title">
    <span class="left">FAMILY</span>
    <span class="right">FRIENDS</span>
  </div>

  <div class="frame-row">
    <div class="triple-frame">
      <div class="opening"></div>
      <div class="opening"></div>
      <div class="opening"></div>
    </div>

    <div class="triple-frame brown">
      <div class="opening"></div>
      <div class="opening"></div>
      <div class="opening"></div>
    </div>
  </div>
</div>
</body>
</html>
