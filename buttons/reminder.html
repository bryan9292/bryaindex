<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reminder Binder</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:360px;
  height:120px;
  background:transparent;
  overflow:visible;
}

body{
  display:grid;
  place-items:center;
  font-family:Arial,sans-serif;
}

.binder-button{
  position:relative;
  width:340px;
  height:96px;
  border:4px solid #17110b;
  border-radius:14px;
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0 18px,
      rgba(90,65,45,.14) 18px 20px
    ),
    linear-gradient(#e9dfc9,#ccb78f);
  box-shadow:
    0 18px 24px rgba(0,0,0,.52),
    inset 0 2px 0 rgba(255,255,255,.55),
    inset 0 -8px 14px rgba(90,60,25,.16);
  overflow:visible;
}

.binder-button::before{
  content:"";
  position:absolute;
  left:34px;
  top:0;
  bottom:0;
  width:4px;
  background:rgba(40,24,14,.45);
  box-shadow:
    3px 0 0 rgba(255,255,255,.22),
    -3px 0 0 rgba(0,0,0,.1);
}

.cover-shine{
  position:absolute;
  inset:0;
  border-radius:10px;
  background:
    linear-gradient(115deg,
      transparent 0 38%,
      rgba(255,255,255,.28) 48%,
      transparent 58% 100%);
  opacity:.45;
  pointer-events:none;
}

.ring{
  position:absolute;
  left:0;
  width:35px;
  height:2px;
  border-radius:999px;
  background:linear-gradient(90deg,#6f7479,#b7bcc1 55%,#7d8287);
  box-shadow:
    0 1px 0 rgba(0,0,0,.18);
  z-index:7;
}

.ring.one{
  top:27px;
}

.ring.two{
  top:65px;
}

.hole{
  position:absolute;
  left:29px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#17110b;
  box-shadow:
    inset 0 1px 2px rgba(0,0,0,.82),
    0 1px 0 rgba(255,255,255,.3);
  z-index:6;
}

.hole.one{
  top:22px;
}

.hole.two{
  top:60px;
}

.title{
  position:absolute;
  left:50px;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  z-index:4;
  color:#666;
  text-align:center;
  font-family:"Trebuchet MS",Arial,sans-serif;
  font-size:1.72rem;
  font-weight:800;
  letter-spacing:.015em;
  line-height:1;
  white-space:nowrap;
  text-shadow:
    0 1px 0 rgba(255,255,255,.34),
    0 -1px 0 rgba(0,0,0,.12);
}
</style>
</head>

<body>

  <div class="binder-button">
    <div class="cover-shine"></div>

    <div class="ring one"></div>
    <div class="ring two"></div>

    <div class="hole one"></div>
    <div class="hole two"></div>

    <div class="title">REMINDER BINDER</div>
  </div>

</body>
</html>
