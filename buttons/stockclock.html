<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Clock</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:380px;height:130px;background:transparent;overflow:visible}
body{display:grid;place-items:center;font-family:Arial,sans-serif}
.stock-clock{position:relative;width:360px;height:106px;border-radius:18px;background:linear-gradient(180deg,#2b2d31,#0b0c0e);border:4px solid #050505;box-shadow:0 18px 24px rgba(0,0,0,.55),inset 0 2px 0 rgba(255,255,255,.12),inset 0 -8px 14px rgba(0,0,0,.55);padding:10px}
.screen{position:relative;width:100%;height:100%;border-radius:12px;background:linear-gradient(180deg,#17191d,#07080a);border:3px solid #151515;box-shadow:inset 0 2px 8px rgba(0,0,0,.8),inset 0 -1px 0 rgba(255,255,255,.08);overflow:hidden}
.brand{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:165px;color:rgba(255,255,255,.82);font-family:"Trebuchet MS",Arial,sans-serif;font-size:1.42rem;font-weight:1000;letter-spacing:.075em;line-height:1;text-transform:uppercase;white-space:nowrap;text-shadow:0 2px 0 rgba(0,0,0,.9),0 0 9px rgba(255,255,255,.16)}
.time{position:absolute;right:17px;top:47%;transform:translateY(-50%);color:#ff2a2a;font-family:"Arial Black","Trebuchet MS",Arial,sans-serif;font-size:2.72rem;font-weight:1000;letter-spacing:.025em;line-height:1;text-shadow:0 0 6px rgba(255,0,0,.78),0 0 15px rgba(255,0,0,.42),0 2px 0 rgba(0,0,0,.8)}
.colon{display:inline-block;transform:translateY(-2px);opacity:.9}
.feet{position:absolute;left:36px;right:36px;bottom:-7px;display:flex;justify-content:space-between}
.foot{width:34px;height:7px;border-radius:0 0 7px 7px;background:#050505;box-shadow:0 3px 4px rgba(0,0,0,.45)}
</style>
</head>
<body>
<div class="stock-clock"><div class="screen"><div class="brand">Stock Clock</div><div class="time">12<span class="colon">:</span>34</div></div><div class="feet"><div class="foot"></div><div class="foot"></div></div></div>
</body>
</html>
