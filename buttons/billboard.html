<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>Billboard Chalkboard Nameplate</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:230px;
  height:62px;
  background:transparent;
  overflow:visible;
}

body{
  position:relative;
}

.panel{
  position:absolute;
  left:10px;
  top:10px;
  width:210px;
  height:42px;
  border-radius:6px;
  border:2.2px solid #5f3f22;
  background:
    linear-gradient(180deg,#5f7d63 0%,#456349 52%,#354d39 100%);
  box-shadow:
    inset 0 -8px 15px rgba(0,0,0,.2),
    0 8px 16px rgba(0,0,0,.28);
  display:grid;
  place-items:center;
  cursor:pointer;
  user-select:none;
  overflow:hidden;
}

.chalk-svg{
  position:relative;
  z-index:2;
  width:204px;
  height:34px;
  overflow:visible;
}

.chalk-back{
  font-family:"Chalkboard SE","Segoe Print","Bradley Hand","Comic Sans MS",cursive;
  font-size:17px;
  font-weight:700;
  letter-spacing:-.15px;
  fill:none;
  stroke:rgba(245,241,220,.24);
  stroke-width:.55;
  stroke-linejoin:round;
  stroke-linecap:round;
  filter:url(#chalkRough);
}

.chalk-front{
  font-family:"Chalkboard SE","Segoe Print","Bradley Hand","Comic Sans MS",cursive;
  font-size:17px;
  font-weight:700;
  letter-spacing:-.15px;
  fill:#f5f1dc;
  filter:url(#chalkRough);
}
</style>
</head>

<body>
  <div class="panel" id="billboardPanel">
    <svg class="chalk-svg" viewBox="0 0 204 34" aria-label="Billboard Chalkboard">
      <defs>
        <filter id="chalkRough">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.85"
            numOctaves="2"
            seed="4"
            result="noise"
          />
          <feDisplacementMap
            in="SourceGraphic"
            in2="noise"
            scale=".38"
            xChannelSelector="R"
            yChannelSelector="G"
          />
        </filter>
      </defs>

      <text class="chalk-back" x="102" y="22" text-anchor="middle">
        Billboard Chalkboard
      </text>

      <text class="chalk-front" x="102" y="22" text-anchor="middle">
        Billboard Chalkboard
      </text>
    </svg>
  </div>
</body>
</html>
