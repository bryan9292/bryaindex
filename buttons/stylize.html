<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="format-detection" content="telephone=no">
<title>Stylize Button</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:210px;
  height:62px;
  background:transparent;
  overflow:visible;
}

body{
  display:grid;
  place-items:center;
  font-family:system-ui,sans-serif;
}

.stylize-btn{
  position:relative;
  border:2px solid rgba(20,80,32,.55);
  border-radius:4px;
  padding:8px 16px;
  background:rgba(80,200,100,.45);
  font-size:32px;
  font-weight:900;
  letter-spacing:2px;
  line-height:1;
  cursor:pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.22),
    inset 0 -1px 0 rgba(0,0,0,.08);
}

.stylize-btn span{
  color:rgba(18,72,28,.62);
  text-shadow:
    0 1px 0 rgba(255,255,255,.28),
    0 -1px 1px rgba(0,0,0,.26);
}

.stylize-btn:hover{
  background:rgba(80,200,100,.55);
}

.stylize-btn:active{
  background:rgba(80,200,100,.62);
}

.stylize-btn:active span{
  text-shadow:
    0 1px 0 rgba(255,255,255,.22),
    0 -1px 1px rgba(0,0,0,.32);
}
</style>
</head>

<body>

<button class="stylize-btn" type="button">
  <span>STYLIZE</span>
</button>

</body>
</html>
