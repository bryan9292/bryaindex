<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Record Checker Button</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  width:390px;
  height:96px;
  display:grid;
  place-items:center;
  background:transparent;
  font-family:system-ui,sans-serif;
  overflow:hidden;
}

.record-checker{
  position:relative;
  width:390px;
  height:96px;
  border:5px solid #777;
  border-radius:14px;
  cursor:pointer;
  overflow:hidden;
  color:#fff;
  background:
    linear-gradient(45deg,#f7f2df 0 25%,transparent 25% 75%,#fff8df 75% 100%) 0 0/40px 40px,
    linear-gradient(45deg,#f8f2dc 0 25%,#141414 25% 75%,#fff7de 75% 100%) 20px 20px/40px 40px,
    radial-gradient(circle at 50% 45%,rgba(255,255,210,.28),transparent 62%),
    #111;
  box-shadow:
    0 16px 28px rgba(0,0,0,.55),
    inset 0 0 0 5px rgba(0,0,0,.45),
    inset 0 -18px 24px rgba(0,0,0,.55),
    0 0 0 4px #2c2c2c;
}

.record-checker::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:9px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.18),transparent 28%,rgba(0,0,0,.32) 78%,rgba(0,0,0,.55)),
    radial-gradient(circle at 50% 45%,rgba(255,255,255,.18),transparent 55%);
  box-shadow:inset 0 0 18px rgba(0,0,0,.78);
  pointer-events:none;
}

.record-checker::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:18px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.72));
  pointer-events:none;
}

.label{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  transform:translateY(-3px);
  font-size:2.1rem;
  font-weight:950;
  letter-spacing:.08em;
  color:#fff;
  -webkit-text-stroke:1.4px #000;
  text-shadow:
    0 3px 0 #000,
    0 0 6px rgba(0,0,0,.95),
    0 0 14px rgba(255,255,255,.45);
  z-index:3;
}

.record-checker:active{
  transform:translateY(2px);
}
</style>
</head>
<body>
<button class="record-checker" type="button">
  <span class="label">RECORD CHECKER</span>
</button>
</body>
</html>
