<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>Status Buttons</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:384px;
  height:146px;
  background:transparent;
  color:#f6f6f6;
  font-family:system-ui,sans-serif;
  overflow:visible;
}

.status-object{
  position:absolute;
  left:0;
  top:0;
  width:384px;
  height:146px;
  background:transparent;
}

.version-tag{
  position:absolute;
  left:12px;
  top:0;
  width:360px;
  height:18px;
  color:rgba(255,255,255,.72);
  font-size:11px;
  font-weight:900;
  letter-spacing:.18em;
  text-align:center;
  text-transform:uppercase;
  text-shadow:0 0 8px rgba(255,255,255,.18);
}

.gold-box{
  position:absolute;
  left:12px;
  top:32px;
  width:360px;
  height:96px;
  border-radius:24px;
  background:#0b0b0b;
  border:1px solid #d4af37;
  box-shadow:
    0 0 9px rgba(212,175,55,.78),
    inset 0 0 18px rgba(212,175,55,.10),
    inset 0 1px 0 rgba(255,240,185,.18);
}

.gold-box::before{
  content:"";
  position:absolute;
  inset:-9px;
  border-radius:34px;
  background:rgba(212,175,55,.22);
  filter:blur(10px);
  z-index:-1;
}

.gold-box::after{
  content:"";
  position:absolute;
  inset:1px;
  border-radius:22px;
  pointer-events:none;
  box-shadow:
    inset 0 0 10px rgba(255,230,150,.08),
    inset 0 -9px 16px rgba(0,0,0,.28);
}

.flow-wrap{
  position:absolute;
  left:10px;
  top:9px;
  width:340px;
  height:78px;
}

.flow-square{
  position:absolute;
  top:0;
  width:78px;
  height:78px;
  border:0;
  border-radius:18px;
  color:#fff;
  font-size:15px;
  font-weight:900;
  letter-spacing:.08em;
  opacity:.28;
  filter:grayscale(.5);
}

#inBtn{
  left:0;
  background:#12361f;
  box-shadow:0 0 18px rgba(0,255,120,.28);
}

#outBtn{
  left:87px;
  background:#3a1414;
  box-shadow:0 0 18px rgba(255,50,50,.28);
}

#busyBtn{
  left:174px;
  background:#122a48;
  box-shadow:0 0 18px rgba(55,150,255,.28);
}

#brbBtn{
  left:261px;
  background:#2d174a;
  box-shadow:0 0 18px rgba(170,80,255,.32);
}

.flow-square.faded{
  opacity:.28;
  filter:grayscale(.5);
  box-shadow:none;
}

.flow-square.active,
.flow-square.scan-lit{
  opacity:1;
  filter:none;
}

.flow-square.scan-lit#inBtn{
  box-shadow:0 0 16px rgba(0,255,120,.32);
}

.flow-square.scan-lit#outBtn{
  box-shadow:0 0 16px rgba(255,50,50,.32);
}

.flow-square.scan-lit#busyBtn{
  box-shadow:0 0 16px rgba(55,150,255,.32);
}

.flow-square.scan-lit#brbBtn{
  box-shadow:0 0 16px rgba(170,80,255,.38);
}
</style>
</head>

<body>
<div class="status-object">
  <div class="version-tag">v9</div>
  <div class="gold-box">
    <div class="flow-wrap">
      <button class="flow-square faded" id="inBtn">IN</button>
      <button class="flow-square faded" id="outBtn">OUT</button>
      <button class="flow-square faded" id="busyBtn">BUSY</button>
      <button class="flow-square faded" id="brbBtn">BRB</button>
    </div>
  </div>
</div>

<script>
const flowButtons=[...document.querySelectorAll('.flow-square')];

let scanTimer=null;
let selected=false;
let scanIndex=0;
let scanDirection=1;

function setActive(btn){
  selected=true;

  if(scanTimer){
    clearTimeout(scanTimer);
  }

  flowButtons.forEach(b=>{
    b.classList.add('faded');
    b.classList.remove('active','scan-lit');
  });

  btn.classList.remove('faded');
  btn.classList.add('active');
}

flowButtons.forEach(btn=>{
  btn.addEventListener('click',()=>setActive(btn));
});

function startupScan(){
  if(selected){
    return;
  }

  flowButtons.forEach(b=>{
    b.classList.add('faded');
    b.classList.remove('scan-lit','active');
  });

  const btn=flowButtons[scanIndex];

  btn.classList.remove('faded');
  btn.classList.add('scan-lit');

  if(scanIndex===flowButtons.length-1){
    scanDirection=-1;
  }

  if(scanIndex===0){
    scanDirection=1;
  }

  scanIndex+=scanDirection;
  scanTimer=setTimeout(startupScan,1450);
}

startupScan();
</script>
</body>
</html>
