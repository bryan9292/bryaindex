<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Preservation Conservation Sign</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:520px;
  height:95px;
  background:transparent;
  font-family:Arial,sans-serif;
  overflow:visible;
}

body{
  position:relative;
}

.reserved-sign{
  position:absolute;
  left:0;
  top:0;
  width:520px;
  height:95px;
  border:4px solid #1b1b1b;
  border-radius:7px;
  background:
    linear-gradient(135deg,
      #f5f5f5 0%,
      #bfc3c5 18%,
      #f9f9f9 36%,
      #8f969a 58%,
      #e6e6e6 78%,
      #9aa0a3 100%);
  box-shadow:
    0 14px 24px rgba(0,0,0,.55),
    inset 0 2px 2px rgba(255,255,255,.75),
    inset 0 -3px 5px rgba(0,0,0,.35);
  display:grid;
  place-items:center;
  overflow:hidden;
}

.reserved-sign::before{
  content:"";
  position:absolute;
  inset:7px;
  border:2px solid rgba(20,20,20,.65);
  border-radius:4px;
  pointer-events:none;
}

.reserved-sign::after{
  content:"";
  position:absolute;
  inset:-40px;
  background:
    linear-gradient(115deg,
      transparent 0 35%,
      rgba(255,255,255,.45) 44%,
      transparent 53% 100%);
  transform:translateX(-55px);
  opacity:.55;
  pointer-events:none;
}

.reserved-text{
  position:relative;
  z-index:2;
  color:#111;
  font-size:28px;
  font-weight:1000;
  letter-spacing:.035em;
  line-height:1;
  white-space:nowrap;
  text-shadow:
    0 1px 0 rgba(255,255,255,.6),
    0 -1px 0 rgba(0,0,0,.25);
}
</style>
</head>

<body>
  <div class="reserved-sign">
    <div class="reserved-text">PRESERVATION CONSERVATION</div>
  </div>
</body>
</html>
